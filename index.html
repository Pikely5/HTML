// Дальше идёт код управления тестом (одинаковый для всех частей)
let userAnswers = new Array(QUESTIONS.length).fill(null);
let answerStatus = new Array(QUESTIONS.length).fill(false);
let currentIndex = 0, statsCorrect = 0, statsWrong = 0;

const questionEl = document.getElementById('questionText');
const optionsContainer = document.getElementById('optionsContainer');
const feedbackArea = document.getElementById('feedbackArea');
const statsSpan = document.getElementById('statsSpan');
const progressFill = document.getElementById('globalProgress');

function updateStatsUI() {
    statsSpan.innerHTML = `✅ ${statsCorrect} | ❌ ${statsWrong}`;
    progressFill.style.width = `${((statsCorrect+statsWrong)/QUESTIONS.length)*100}%`;
}
function saveToLocalStorage() {
    localStorage.setItem('rivps_part1_answers', JSON.stringify(userAnswers));
    localStorage.setItem('rivps_part1_status', JSON.stringify(answerStatus));
    localStorage.setItem('rivps_part1_stats', JSON.stringify({ correct: statsCorrect, wrong: statsWrong }));
}
function loadFromLocalStorage() {
    const a = localStorage.getItem('rivps_part1_answers');
    if(a) { try { let arr=JSON.parse(a); if(arr.length===QUESTIONS.length) userAnswers=arr; } catch(e){} }
    const s = localStorage.getItem('rivps_part1_status');
    if(s) { try { let st=JSON.parse(s); if(st.length===QUESTIONS.length) answerStatus=st; } catch(e){} }
    const st = localStorage.getItem('rivps_part1_stats');
    if(st) { try { let d=JSON.parse(st); statsCorrect=d.correct; statsWrong=d.wrong; } catch(e){} }
    let c=0,w=0;
    for(let i=0;i<QUESTIONS.length;i++) {
        if(userAnswers[i]!==null) {
            let isRight = (QUESTIONS[i].options[userAnswers[i]] === QUESTIONS[i].correct);
            answerStatus[i]=isRight;
            if(isRight) c++; else w++;
        } else answerStatus[i]=false;
    }
    if(c!==statsCorrect||w!==statsWrong) { statsCorrect=c; statsWrong=w; }
    updateStatsUI(); saveToLocalStorage();
}
function render() {
    const q = QUESTIONS[currentIndex];
    questionEl.innerText = q.q;
    optionsContainer.innerHTML = '';
    const selected = userAnswers[currentIndex];
    q.options.forEach((opt,idx)=>{
        const div = document.createElement('div'); div.className='option';
        if(selected!==null) div.classList.add('disabled-opt');
        const span = document.createElement('span'); span.className='opt-prefix'; span.innerText=String.fromCharCode(65+idx);
        const text = document.createElement('span'); text.innerText=opt;
        div.appendChild(span); div.appendChild(text);
        if(selected!==null && opt===q.correct) div.classList.add('correct-highlight');
        if(selected!==null && selected===idx && opt!==q.correct) div.classList.add('wrong-highlight');
        if(selected===null) div.addEventListener('click',()=>handleAnswer(idx));
        optionsContainer.appendChild(div);
    });
    if(selected!==null) {
        let isOk = (q.options[selected]===q.correct);
        feedbackArea.innerHTML = isOk ? `<span>✅ Верно! ${q.correct}</span>` : `<span>❌ Неверно. Правильный ответ: ${q.correct}</span>`;
        feedbackArea.className = isOk ? 'feedback feedback-correct' : 'feedback feedback-wrong';
    } else { feedbackArea.innerHTML = `<span>🤔 Выберите вариант.</span>`; feedbackArea.className='feedback'; }
    updateStatsUI(); saveToLocalStorage();
}
function handleAnswer(idx) {
    if(userAnswers[currentIndex]!==null) return;
    let isCorrect = (QUESTIONS[currentIndex].options[idx] === QUESTIONS[currentIndex].correct);
    userAnswers[currentIndex]=idx; answerStatus[currentIndex]=isCorrect;
    if(isCorrect) statsCorrect++; else statsWrong++;
    updateStatsUI(); saveToLocalStorage(); render();
}
document.getElementById('prevBtn').addEventListener('click',()=>{ if(currentIndex>0){currentIndex--; render();} });
document.getElementById('nextBtn').addEventListener('click',()=>{ if(currentIndex+1<QUESTIONS.length){currentIndex++; render();} });
document.getElementById('randomBtn').addEventListener('click',()=>{ currentIndex=Math.floor(Math.random()*QUESTIONS.length); render(); });
document.getElementById('resetBtn').addEventListener('click',()=>{ if(confirm('Сбросить?')){ userAnswers.fill(null); answerStatus.fill(false); statsCorrect=0; statsWrong=0; saveToLocalStorage(); render(); } });
loadFromLocalStorage(); render();
</script>
